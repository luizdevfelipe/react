services:
  node-app:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: node-app-graphql
    volumes:
      - ./server:/app
      - /app/node_modules
    working_dir: /app
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
    networks:
      - graphql-network
    restart: unless-stopped

  react-app:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: react-app-graphql
    volumes:
      - ./client:/app
      - /app/node_modules
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_GRAPHQL_URL=http://localhost:4000/graphql
    networks:
      - graphql-network
    depends_on:
      - node-app
    restart: unless-stopped

networks:
  graphql-network:
    driver: bridge